<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cast Analyzer Pro</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f0f7; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 12px; background: #000; margin-bottom: 15px; height: 300px; object-fit: cover; }
        button { padding: 15px 25px; font-size: 16px; border: none; border-radius: 12px; margin: 5px; font-weight: 600; color: white; cursor: pointer; }
        #btnConnect { background: #5856d6; }
        #btnStart { background: #34c759; }
        #btnStop { background: #ff3b30; }
        button:disabled { background: #aeaeb2 !important; }
        .chart-box { height: 200px; margin-top: 20px; }
        .label { font-size: 12px; font-weight: bold; color: #8e8e93; text-transform: uppercase; text-align: left; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>🎣 Cast Analyzer</h2>
    <video id="vid" autoplay playsinline muted></video>
    <div class="controls">
        <button id="btnConnect">1. Koppel Sensor</button>
        <button id="btnStart" disabled>2. Start Opname</button>
        <button id="btnStop" disabled>3. Stop & Analyse</button>
    </div>
    <div class="label">Versnelling (X/Y/Z)</div>
    <div class="chart-box"><canvas id="accelChart"></canvas></div>
    <div class="label">Rotatie (X/Y/Z)</div>
    <div class="chart-box"><canvas id="gyroChart"></canvas></div>
</div>

<script>
    let stream, mediaRecorder, sensorChar, accelChart, gyroChart, startTime;
    let videoChunks = [], sensorData = [];
    const video = document.getElementById('vid');

    // 1. KOPPELEN (Camera + Bluetooth na klik)
    document.getElementById('btnConnect').onclick = async () => {
        try {
            // Vraag eerst camera (voorkomt blokkade)
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;

            // Vraag dan Bluetooth
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true, optionalServices: ['180d']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('180d');
            sensorChar = await service.getCharacteristic('2a37');
            
            document.getElementById('btnConnect').innerText = "Verbonden ✓";
            document.getElementById('btnStart').disabled = false;
        } catch (e) { 
            alert("Toegang geweigerd of Bluetooth uit. Controleer Instellingen > Bluefy! Fout: " + e); 
        }
    };

    // 2. START
    document.getElementById('btnStart').onclick = () => {
        videoChunks = []; sensorData = []; startTime = Date.now();
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => videoChunks.push(e.data);
        sensorChar.startNotifications();
        sensorChar.oncharacteristicvaluechanged = (e) => {
            const v = e.target.value;
            sensorData.push({
                t: (Date.now() - startTime) / 1000,
                ax: v.getInt16(0, true)/100, ay: v.getInt16(2, true)/100, az: v.getInt16(4, true)/100,
                gx: v.getInt16(6, true), gy: v.getInt16(8, true), gz: v.getInt16(10, true)
            });
        };
        mediaRecorder.start();
        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnStop').disabled = false;
    };

    // 3. STOP
    document.getElementById('btnStop').onclick = () => {
        mediaRecorder.stop();
        sensorChar.stopNotifications();
        mediaRecorder.onstop = () => {
            const blob = new Blob(videoChunks, { type: 'video/mp4' });
            video.srcObject = null; video.src = URL.createObjectURL(blob);
            video.controls = true; video.muted = false;
            initCharts();
            document.getElementById('btnStop').disabled = true;
            document.getElementById('btnStart').disabled = false;
        };
    };

    function initCharts() {
        const opt = { 
            responsive: true, maintainAspectRatio: false, animation: false,
            scales: { x: { type: 'linear', title: { display: true, text: 'Seconden' } } }
        };
        if(accelChart) accelChart.destroy();
        accelChart = new Chart(document.getElementById('accelChart'), {
            type: 'line', 
            data: { datasets: [
                {label:'X', data:sensorData.map(d=>({x:d.t,y:d.ax})), borderColor:'red', pointRadius:0},
                {label:'Y', data:sensorData.map(d=>({x:d.t,y:d.ay})), borderColor:'green', pointRadius:0},
                {label:'Z', data:sensorData.map(d=>({x:d.t,y:d.az})), borderColor:'blue', pointRadius:0}
            ]}, options: opt
        });
        if(gyroChart) gyroChart.destroy();
        gyroChart = new Chart(document.getElementById('gyroChart'), {
            type: 'line', 
            data: { datasets: [
                {label:'X', data:sensorData.map(d=>({x:d.t,y:d.gx})), borderColor:'orange', pointRadius:0},
                {label:'Y', data:sensorData.map(d=>({x:d.t,y:d.gy})), borderColor:'purple', pointRadius:0},
                {label:'Z', data:sensorData.map(d=>({x:d.t,y:d.gz})), borderColor:'cyan', pointRadius:0}
            ]}, options: opt
        });
    }

    video.ontimeupdate = () => {
        if(!accelChart) return;
        const t = video.currentTime;
        [accelChart, gyroChart].forEach(chart => {
            chart.options.plugins.annotation = {
                annotations: { line: { type: 'line', xMin: t, xMax: t, borderColor: 'black', lineWidth: 2 } }
            };
            chart.update('none');
        });
    };
</script>
</body>
</html>
