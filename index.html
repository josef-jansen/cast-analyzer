<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#007aff">
    <title>Cast Analyzer</title>

    <!-- Main Styles -->
    <style>
        :root {
            --primary-color: #007aff;
            --danger-color: #ff3b30;
            --safe-color: #34c759;
            --secondary-color: #5856d6;
            --neutral-color: #8e8e93;
            --background-color: #f2f2f7;
            --font-color: #000;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: "Arial", sans-serif;
            background-color: var(--background-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .header {
            flex: 0 0 145px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            background-color: #fff;
            border-bottom: 1px solid #ddd;
        }

        .header .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        button {
            all: unset;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            padding: 10px 15px;
            background-color: var(--primary-color);
            color: white;
        }

    </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <p>Cast analyzer Tracker</p>
      <div class="controls"><button>Sync</button></div>
      </div>
  </div>
</body>
