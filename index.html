<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cast Analyzer Pro Slider</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #f2f2f7; font-family: -apple-system, sans-serif; }
        
        /* Layout verdeling */
        .controls { height: 145px; padding: 10px; text-align: center; background: #f2f2f7; border-bottom: 1px solid #ddd; position: relative; z-index: 20; }
        
        :root { --bottom-area: 130px; --content-h: calc((100vh - 145px - var(--bottom-area)) / 3); }
        
        .section { width: 100%; height: var(--content-h); background: #fff; border-bottom: 1px solid #eee; position: relative; overflow: hidden; }
        .video-container { background: #000; display: flex; justify-content: center; align-items: center; border-bottom: none; }
        
        /* De Brede Slider onderaan */
        .bottom-area { 
            height: var(--bottom-area); width: 100%; background: #f2f2f7; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 15px;
            border-top: 1px solid #ddd;
        }
        #syncSlider { width: 85%; height: 50px; cursor: pointer; }
        #timeLabel { font-size: 14px; font-weight: bold; color: #333; margin-top: 5px; }

        canvas { width: 100% !important; height: 100% !important; display: block; }
        
        .video-container {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden; /* belangrijk */
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover; /* vult de container */
}

        /* Buttons & UI */
        /* Professionele knopstijl */
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            color: #fff;
            margin-right: 6px;
            background: #666; /* fallback */
        }

        /* Kleuren per knop */
        #btnConnect { background: #007aff; }  /* blauw */
        #btnStart   { background: #34c759; }  /* groen */
        #btnStop    { background: #ff3b30; }  /* rood */
        #btnSave    { background: #5856d6; }  /* paars */
        #btnReset   { background: #8e8e93; }  /* grijs */

        /* X/Y/Z segmented control */
        .axisBtn {
            padding: 6px 14px;
            border: 1px solid #007aff;
            border-radius: 6px;
            background: #fff;
            color: #007aff;
            font-size: 14px;
            margin: 0 3px;
        }

        .axisBtn.active {
            background: #007aff;
            color: #fff;
        }

        /* DEL knop in dezelfde stijl als Reset */
        #btnDel {
            background: #8e8e93;
            padding: 8px 14px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            border: none;
        }
        
        select { padding: 8px; border-radius: 8px; border: 1px solid #ccc; font-size: 13px; width: 65%; margin-top: 8px; }
        .status-text { font-size: 10px; color: #666; margin-top: 4px; }
        #vBack { display: none; }

        .graph-container {
            background: #ffffff;
            border-radius: 12px;
            padding: 10px;
            margin: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            height: calc(var(--content-h) - 20px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Professionele videokaart */
        .video-card {
            background: #000;
            border-radius: 12px;
            margin: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            height: calc(var(--content-h) - 20px);
            overflow: hidden; /* voorkomt dat video buiten de randen komt */
            display: flex;
            align-items: center;
            justify-content: center;
        }
       
    </style>
</head>
<body>

    <div class="controls">
        <button id="btnConnect">Connect</button>
        <button id="btnStart" disabled>Start</button>
        <button id="btnStop" disabled>Stop</button>
        <button id="btnSave" disabled>Save</button>
        <button id="btnReset" style="background:#8e8e93;">Reset</button>
        
        <div class="status-text">Data: <span id="dataCount">0</span> | <span id="dbStatus">DB Ready</span></div>
        
        <select id="archiveSelect">
            <option value="">-- Worp Selecteren --</option>
        </select>
        <button onclick="deleteSession()">Del</button>

        <div style="margin-top:8px;">
            <button id="bX" class="axisBtn active" onclick="setAxis('x')">X</button>
            <button id="bY" class="axisBtn" onclick="setAxis('y')">Y</button>
            <button id="bZ" class="axisBtn" onclick="setAxis('z')">Z</button>
        </div>
    </div>

        <div class="section">
            <div class="graph-container">
                <canvas id="cAcc"></canvas>
            </div>
        </div>

        <div class="section">
            <div class="graph-container">
                <canvas id="cGyro"></canvas>
            </div>
        </div>
    
        <div class="section">
            <div class="video-card">
                <video id="vLive" playsinline muted autoplay></video>
                <video id="vBack" playsinline></video>
            </div>
        </div>


    <div class="bottom-area">
        <input type="range" id="syncSlider" min="0" max="1000" value="0" disabled>
        <div id="timeLabel">0.00s / 0.00s</div>
    </div>

<script>
let char, stream, recorder, db, data = [];
let axis = 'x', chunks = [];

const elLive = document.getElementById('vLive'), elBack = document.getElementById('vBack'), elCount = document.getElementById('dataCount');
const archiveSelect = document.getElementById('archiveSelect'), slider = document.getElementById('syncSlider'), timeLabel = document.getElementById('timeLabel');

// ---------------------------------------------------------
// Hulpfunctie: maakt beide grafieken volledig leeg
// ---------------------------------------------------------
function clearGraphs() {
    const ids = ["cAcc", "cGyro"];
    ids.forEach(id => {
        const c = document.getElementById(id);
        const ctx = c.getContext("2d");
        ctx.clearRect(0, 0, c.width, c.height);
    });
}

    
// --- DATABASE ---
const dbRequest = indexedDB.open("CastAnalyzerDB", 1);
dbRequest.onupgradeneeded = (e) => { e.target.result.createObjectStore("sessions", { keyPath: "id", autoIncrement: true }); };
dbRequest.onsuccess = (e) => { db = e.target.result; loadArchiveList(); };

function loadArchiveList() {
    archiveSelect.innerHTML = '<option value="">-- Worp Selecteren --</option>';
    const store = db.transaction("sessions", "readonly").objectStore("sessions");
    store.openCursor(null, "prev").onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) {
            const opt = document.createElement("option");
            opt.value = cursor.value.id; opt.textContent = cursor.value.name;
            archiveSelect.appendChild(opt); cursor.continue();
        }
    };
}

archiveSelect.onchange = () => {
    if (!archiveSelect.value) return;
    db.transaction("sessions", "readonly").objectStore("sessions").get(Number(archiveSelect.value)).onsuccess = (e) => {
        const s = e.target.result;
        data = s.sensorData;
        elBack.src = URL.createObjectURL(s.videoBlob);
        axis = s.axis || 'x';
        elLive.style.display = "none"; elBack.style.display = "block";
        slider.disabled = false;
        setTimeout(updateUI, 500);
    };
};

// --- SLIDER & UI ---
slider.oninput = () => {
    if (elBack.duration > 0) {
        elBack.currentTime = (slider.value / 1000) * elBack.duration;
        updateUI();
    }
};

function updateUI() {
    if (elBack.duration > 0) {
        timeLabel.innerText = elBack.currentTime.toFixed(2) + "s / " + elBack.duration.toFixed(2) + "s";
    }
    draw();
}

elBack.ontimeupdate = () => {
    if (!recorder || recorder.state !== "recording") {
        slider.value = (elBack.currentTime / elBack.duration) * 1000 || 0;
        updateUI();
    }
};

// --- CORE ---
document.getElementById('btnConnect').onclick = async () => {
    try {
        const device = await navigator.bluetooth.requestDevice({ filters: [{ name: "Cast" }], optionalServices: ['19b10000-e8f2-537e-4f6c-d104768a1214'] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('19b10000-e8f2-537e-4f6c-d104768a1214');
        char = await service.getCharacteristic('19b10001-e8f2-537e-4f6c-d104768a1214');
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        elLive.srcObject = stream;
        char.addEventListener('characteristicvaluechanged', (e) => {
            const v = e.target.value;
            data.push({ ax: v.getInt16(0, true)/100, ay: v.getInt16(2, true)/100, az: v.getInt16(4, true)/100, gx: v.getInt16(6, true), gy: v.getInt16(8, true), gz: v.getInt16(10, true) });
            elCount.innerText = data.length;
        });
        document.getElementById('btnConnect').disabled = true; document.getElementById('btnStart').disabled = false;
    } catch (e) { alert(e); }
};

document.getElementById('btnStart').onclick = async () => {
    data = []; chunks = []; elCount.innerText = "0"; slider.disabled = true;
    await char.startNotifications();
    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
        elLive.style.display = "none"; elBack.style.display = "block";
        elBack.src = URL.createObjectURL(new Blob(chunks, { type: 'video/mp4' }));
        document.getElementById('btnSave').disabled = false; slider.disabled = false;

        // Na opname automatisch Y-as tonen
        setAxis('y');
        
        setTimeout(updateUI, 1000);
    };
    recorder.start();
    elBack.style.display = "none"; elLive.style.display = "block";
    document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false;
};

document.getElementById('btnStop').onclick = async () => {
    try { await char.stopNotifications(); } catch(e) {}
    recorder.stop();
    document.getElementById('btnStop').disabled = true; document.getElementById('btnStart').disabled = false;
};

document.getElementById('btnSave').onclick = () => {
    const name = prompt("Naam:", "Worp " + new Date().toLocaleTimeString());
    if (!name) return;
    const tx = db.transaction("sessions", "readwrite");
    tx.objectStore("sessions").add({ name, sensorData: data, videoBlob: new Blob(chunks, { type: 'video/mp4' }), axis, date: new Date() });
    tx.oncomplete = () => { loadArchiveList(); alert("Opgeslagen!"); };
};

document.getElementById('btnReset').onclick = async () => {

    // 1. Stop BLE notificaties (als actief)
    try { 
        if (char) await char.stopNotifications(); 
    } catch(e) {}

    // 2. Stop recorder (als actief)
    try { 
        if (recorder && recorder.state !== "inactive") recorder.stop(); 
    } catch(e) {}

    // 3. Video terug naar live
    elBack.pause();
    elBack.src = "";
    elBack.style.display = "none";
    elLive.style.display = "block";

    // 4. Data resetten
    data = [];
    chunks = [];
    elCount.innerText = "0";

    // 5. Slider resetten
    slider.value = 0;
    slider.disabled = true;

    // 6. Tijdlabel resetten
    timeLabel.innerText = "0.00s / 0.00s";

    // 7. Grafieken leegmaken
    clearGraphs();

    // 8. UI terugzetten
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
    document.getElementById('btnSave').disabled = true;

    // 9. Selectie wissen
    archiveSelect.value = "";
};

    
function deleteSession() {
    if (!archiveSelect.value || !confirm("Verwijderen?")) return;
    const tx = db.transaction("sessions", "readwrite");
    tx.objectStore("sessions").delete(Number(archiveSelect.value));
    tx.oncomplete = () => { loadArchiveList(); elBack.src = ""; draw(); };
}

function setAxis(a) {
    axis = a;
    document.querySelectorAll('.axisBtn').forEach(b => b.classList.toggle('active', b.id === 'b'+a.toUpperCase()));
    updateUI();
}

function draw() {
    if (data.length < 2) return;
    let progress = (elBack.duration > 0) ? elBack.currentTime / elBack.duration : 0;
    render("cAcc", data.map(d => d['a' + axis]), "#007aff", "Versnelling " + axis.toUpperCase(), "m/s²", progress);
    render("cGyro", data.map(d => d['g' + axis]), "#ff3b30", "Rotatie " + axis.toUpperCase(), "°/s", progress);
}

function render(id, points, color, label, unit, progress) {
    const c = document.getElementById(id), ctx = c.getContext('2d'), dpr = window.devicePixelRatio || 2;
    c.width = c.clientWidth * dpr; c.height = c.clientHeight * dpr;
    const w = c.width, h = c.height, pL = w * 0.1, pR = w * 0.1, pT = h * 0.1, pB = h * 0.1, gW = w - pL - pR, gH = h - pT - pB, center = h / 2;
    ctx.clearRect(0, 0, w, h);
    
 // --- SCHAALBEPALING ---
let maxAbs = Math.max(...points.map(Math.abs), 1);
const scaleY = (gH / 2) / maxAbs;

// --- Y-AS TEKENEN ---
ctx.strokeStyle = "#444";
ctx.lineWidth = 1 * dpr;
ctx.beginPath();
ctx.moveTo(pL, pT);
ctx.lineTo(pL, h - pB);
ctx.stroke();

// --- Y-AS LABELS ---
ctx.fillStyle = "#333";
ctx.font = (14 * dpr) + "px Arial";
ctx.textAlign = "right";
ctx.textBaseline = "middle";

const steps = 4;
for (let i = -steps; i <= steps; i++) {
    const value = (maxAbs / steps) * i;
    const y = center - (value * scaleY);

    const rounded =
        unit === "m/s2"
            ? value.toFixed(1)       // acceleratie: 1 decimaal
            : Math.round(value);     // gyro: hele getallen

    ctx.fillText(rounded, pL - 8 * dpr, y);
}

// --- GRIDLINES ---
ctx.strokeStyle = "#e0e0e0";
ctx.lineWidth = 0.5 * dpr;
for (let i = -steps; i <= steps; i++) {
    const y = center - ((maxAbs / steps) * i * scaleY);
    ctx.beginPath();
    ctx.moveTo(pL, y);
    ctx.lineTo(w - pR, y);
    ctx.stroke();
}

// --- MIDDELLIJN ---
ctx.strokeStyle = "#bbb";
ctx.lineWidth = 1 * dpr;
ctx.beginPath();
ctx.moveTo(pL, center);
ctx.lineTo(w - pR, center);
ctx.stroke();

    
    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 1.5 * dpr; ctx.lineJoin = "round";
    points.forEach((p, i) => {
        const x = pL + (i / (points.length - 1)) * gW, y = center - (p * scaleY);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    if (progress > 0) {
        const cursorX = pL + (progress * gW);
        ctx.strokeStyle = "#ff9500"; ctx.lineWidth = 1 * dpr;
        ctx.beginPath(); ctx.moveTo(cursorX, pT); ctx.lineTo(cursorX, h - pB); ctx.stroke();
    }
    ctx.fillStyle = "#333"; ctx.font = "bold " + (18 * dpr) + "px Arial"; ctx.textAlign = "left"; ctx.fillText(label + " (" + unit + ")", pL + 10 * dpr, pT + 20 * dpr);
}
</script>
</body>
</html>
